<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CactusRSVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            width: 500px;
            min-height: 400px;
            padding: 15px;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #fff;
        }

        .input-section {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-section input[type="text"] {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #16213e;
            color: #fff;
            font-size: 0.9rem;
        }

        .input-section input[type="text"]:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
        }

        .btn-secondary {
            background: #0f3460;
            color: white;
        }

        .btn-secondary:hover {
            background: #1a5090;
        }

        .btn-highlight {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: white;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1rem;
            padding: 12px 20px;
            border: 2px solid #f39c12;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        .btn-highlight:hover {
            background: linear-gradient(135deg, #e67e22, #c0392b);
            border-color: #e67e22;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
            transform: translateY(-1px);
        }

        .btn-highlight:disabled {
            background: linear-gradient(135deg, #555, #444);
            border-color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .reader-display {
            background: #16213e;
            border-radius: 12px;
            padding: 40px 15px;
            margin-bottom: 15px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .orp-marker {
            position: absolute;
            left: 50%;
            top: 15px;
            bottom: 15px;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--highlight-color, #e94560) 30%, var(--highlight-color, #e94560) 70%, transparent);
            opacity: 0.3;
        }

        .word-container {
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .word-before {
            text-align: right;
            width: 150px;
        }

        .word-highlight {
            color: var(--highlight-color, #e94560);
            width: 1ch;
            text-align: center;
        }

        .word-after {
            text-align: left;
            width: 150px;
        }

        .placeholder-text {
            color: #666;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .controls .btn {
            min-width: 80px;
        }

        .settings {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting-group label {
            font-size: 0.75rem;
            color: #aaa;
        }

        .setting-group input[type="range"] {
            width: 100%;
            accent-color: #e94560;
        }

        .setting-group input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .setting-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #e94560;
            transition: width 0.1s;
        }

        .status {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .picker-section {
            margin-bottom: 15px;
        }

        .word-picker {
            background: #0d1b2a;
            border-radius: 8px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            flex-wrap: wrap;
            gap: 5px;
        }

        .word-picker.visible {
            display: flex;
        }

        .word-picker span {
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            color: #888;
            transition: all 0.15s;
            background: #16213e;
        }

        .word-picker span:hover {
            background: #e94560;
            color: #fff;
        }

        .word-picker span.current {
            background: #e94560;
            color: #fff;
        }

        .word-picker .more-indicator {
            color: #555;
            cursor: default;
            background: transparent;
        }

        .word-picker .more-indicator:hover {
            background: transparent;
            color: #555;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #16213e;
            color: #fff;
            font-size: 0.85rem;
        }

        .search-box:focus {
            outline: none;
            border-color: #e94560;
        }

        .preview-section {
            margin-bottom: 15px;
        }

        .text-preview {
            background: #0d1b2a;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            line-height: 1.8;
            font-size: 0.9rem;
            color: #666;
        }

        .text-preview.visible {
            display: block;
        }

        .text-preview span {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .text-preview span:hover {
            background: #1a3a5c;
            color: #fff;
        }

        .text-preview span.current-word {
            background: #e94560;
            color: #fff;
        }

        .text-preview span.past-word {
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🌵 CactusRSVP</h1>

    <div class="input-section">
        <input type="text" id="pdfUrl" placeholder="Wklej URL do PDF...">
        <button class="btn btn-primary" id="loadUrlBtn">Wczytaj</button>
        <div class="file-input-wrapper">
            <button class="btn btn-secondary">Plik</button>
            <input type="file" accept=".pdf" id="fileInput">
        </div>
    </div>

    <div class="status" id="status">Wczytaj PDF aby rozpocząć</div>

    <div class="progress-bar">
        <div class="progress-bar-fill" id="progress" style="width: 0%"></div>
    </div>

    <div class="reader-display">
        <div class="orp-marker"></div>
        <div class="word-container" id="wordDisplay" style="font-size: 36px;">
            <span class="placeholder-text">Tutaj pojawi się tekst</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="playBtn" disabled>▶ Start</button>
        <button class="btn btn-secondary" id="rewindBtn" disabled title="Cofnij 15s">-15s</button>
        <button class="btn btn-secondary" id="restartBtn" disabled>↺</button>
        <button class="btn btn-secondary" id="prevBtn" disabled>←</button>
        <button class="btn btn-secondary" id="nextBtn" disabled>→</button>
    </div>

    <div class="preview-section">
        <button class="btn btn-secondary" id="togglePreview" style="width:100%; margin-bottom:10px;" disabled>Podgląd tekstu</button>
        <div id="textPreview" class="text-preview"></div>
    </div>

    <div class="picker-section">
        <button class="btn btn-highlight" id="togglePicker" disabled>📍 Wybierz miejsce startu</button>
        <input type="text" id="wordSearch" class="search-box" placeholder="Szukaj słowa lub frazy (np. 'bitcoin system')..." style="display:none;">
        <div id="wordPicker" class="word-picker"></div>
    </div>

    <div class="settings">
        <div class="setting-group">
            <label>Prędkość</label>
            <input type="range" id="speed" min="100" max="800" value="300">
            <span class="setting-value"><span id="speedValue">300</span> WPM</span>
        </div>
        <div class="setting-group">
            <label>Rozmiar</label>
            <input type="range" id="fontSize" min="24" max="72" value="36">
            <span class="setting-value"><span id="fontSizeValue">36</span>px</span>
        </div>
        <div class="setting-group">
            <label>Kolor</label>
            <input type="color" id="highlightColor" value="#e94560">
        </div>
    </div>

    <script src="lib/pdf.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
